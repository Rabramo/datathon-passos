name: Drift Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  monitoramento-drift:
    name: Monitoramento de Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar monitoramento
        id: monitor
        run: |
          set +e
          python -m src.monitoring.drift \
            --reference data/processed/pair_2022_2023.parquet \
            --current data/processed/pair_2023_2024.parquet \
            --output-dir artifacts/monitoring \
            --warn-threshold 0.10 \
            --alert-threshold 0.25
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then
            echo "status=alert" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 0 ]; then
            echo "status=ok_or_warn" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload relatório
        uses: actions/upload-artifact@v4
        with:
          name: drift-monitoring-report
          path: artifacts/monitoring/
          if-no-files-found: error
          retention-days: 14

      - name: Alertar webhook
        if: ${{ steps.monitor.outputs.status == 'alert' || steps.monitor.outputs.status == 'error' }}
        env:
          DRIFT_ALERT_WEBHOOK_URL: ${{ secrets.DRIFT_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${DRIFT_ALERT_WEBHOOK_URL}" ]; then
            echo "Secret DRIFT_ALERT_WEBHOOK_URL não configurado. Alerta externo ignorado."
            exit 0
          fi
          payload=$(cat <<'JSON'
          {
            "text": "ALERTA: monitoramento de drift detectou status crítico no repositório datathon-passos. Verifique o artifact drift-monitoring-report."
          }
          JSON
          )
          curl -fsS -X POST "${DRIFT_ALERT_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${payload}"

      - name: Falhar job em alerta crítico
        if: ${{ steps.monitor.outputs.status == 'alert' || steps.monitor.outputs.status == 'error' }}
        run: |
          echo "Monitoramento de drift sinalizou status crítico: ${{ steps.monitor.outputs.status }}"
          exit 1

